<script>
function togglePub(el) {
  var article = el.closest('article');
  var content = article.querySelector('.pub-content');
  if (content) {
    var isOpen = content.style.display !== 'none';
    content.style.display = isOpen ? 'none' : 'block';
    el.style.opacity = isOpen ? '1' : '0.75';
  }
}
</script>
